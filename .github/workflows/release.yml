name: release

# Build signed-ready REO binaries for every platform and publish them to a
# GitHub Release whenever you push a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# You can also run it by hand from the Actions tab (workflow_dispatch).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: reo-x86_64-pc-windows-msvc.exe
            bin: reo.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: reo-x86_64-apple-darwin
            bin: reo
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: reo-aarch64-apple-darwin
            bin: reo
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: reo-x86_64-unknown-linux-gnu
            bin: reo
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: reo-aarch64-unknown-linux-gnu
            bin: reo
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 Linux cross-linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package + checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Package + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}").Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii -NoNewline "${{ matrix.asset }}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The install scripts fetch binaries straight from these release assets.
          # The install scripts themselves are shipped as assets too, so users can
          # `curl .../releases/latest/download/install.sh | sh`.
          files: |
            dist/*
            install/install.sh
            install/install.ps1
          generate_release_notes: true
